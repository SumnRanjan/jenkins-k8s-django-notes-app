apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-app-deployment
  namespace: notes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-app
  template:
    metadata:
      labels:
        app: notes-app
    spec:
      containers:
        - name: notes-app
          image: rocketboies/notes-app-k8s:latest
          ports:
            - containerPort: 8000
          env:
            - name: DB_NAME
              value: "notesapp"
            - name: DB_USER
              value: "root"
            - name: DB_PASSWORD
              value: "root123"
            - name: DB_HOST
              value: "mysql-service"
            - name: DB_PORT
              value: "3306"